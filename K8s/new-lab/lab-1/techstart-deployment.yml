cat << 'EOF' > techstart-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techstart-catalog
  labels:
    app: techstart
spec:
  replicas: 3
  selector:
    matchLabels:
      app: techstart
  template:
    metadata:
      labels:
        app: techstart
    spec:
      containers:
      - name: catalog
        image: techstart-catalog:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
EOF
