cat << 'EOF' > techstart-external-secret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: techstart/database
      property: username
  - secretKey: password
    remoteRef:
      key: techstart/database
      property: password
  - secretKey: host
    remoteRef:
      key: techstart/database
      property: host
EOF
