cat << 'EOF' > catalog-hpa.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog
        image: techstart-catalog:2.0
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-svc
spec:
  type: NodePort
  selector:
    app: catalog
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080
EOF
