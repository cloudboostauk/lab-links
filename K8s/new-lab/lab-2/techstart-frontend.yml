cat << 'EOF' > frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techstart-frontend
  labels:
    app: techstart
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techstart
      component: frontend
  template:
    metadata:
      labels:
        app: techstart
        component: frontend
    spec:
      containers:
      - name: frontend
        image: techstart-frontend:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: CATALOG_URL
          value: "http://catalog-service"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: techstart
    component: frontend
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
EOF
