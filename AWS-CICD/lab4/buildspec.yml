version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: eu-west-2
    # ECR_REPO_URI is injected by CodeBuild environment variables — set in Task 9

phases:
  pre_build:
    commands:
      # Authenticate Docker to ECR so it can push images
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      # Use the CodePipeline execution ID as the image tag for traceability
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $ECR_REPO_URI:$IMAGE_TAG .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      # Write the image URI to a file — CodePipeline passes this to the Deploy stage
      - printf '[{"name":"quickshop-container","imageUri":"%s"}]' $ECR_REPO_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
