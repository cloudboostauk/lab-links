version: '3.8'

services:
  web:
    image: dockersamples/examplevotingapp_vote
    ports:
      - "8080:80"
    networks:
      - frontend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    environment:
      - API_URL=http://api:3000

  api:
    image: dockersamples/examplevotingapp_worker
    networks:
      - frontend
      - backend
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=taskuser
      - POSTGRES_PASSWORD=taskpass123
      - POSTGRES_DB=taskdb
      - REDIS_URL=redis://redis:6379

  db:
    image: postgres:15-alpine
    networks:
      - backend
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass123
      POSTGRES_DB: taskdb
    volumes:
      - db-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    networks:
      - frontend
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay

volumes:
  db-data: