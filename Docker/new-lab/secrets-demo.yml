version: '3.9'


secrets:
 db_password:
   external: true
 api_key:
   external: true


services:
 api:
   image: nginx:alpine
   deploy:
     replicas: 1
   secrets:
     - db_password
     - api_key
   environment:
     # Point to secret file, NOT the value
     - DB_PASSWORD_FILE=/run/secrets/db_password
     - API_KEY_FILE=/run/secrets/api_key