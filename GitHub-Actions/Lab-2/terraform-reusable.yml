name: Reusable Terraform Workflow

# This workflow is triggered by OTHER workflows, not by push/PR
on:
  workflow_call:
    # Inputs are parameters the calling workflow passes in
    inputs:
      environment:
        required: true
        type: string
        description: "Environment to deploy to (dev, staging, production)"
      working-directory:
        required: false
        type: string
        default: '.'
        description: "Directory containing Terraform files"
    # Secrets must be explicitly passed (not inherited)
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true

jobs:
  terraform:
    name: Terraform ${{ inputs.environment }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Restore Terraform State
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-${{ inputs.environment }}-${{ github.repository }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="environment=${{ inputs.environment }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="environment=${{ inputs.environment }}"

      - name: Save Terraform State
        uses: actions/cache/save@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
            .terraform
          key: terraform-state-${{ inputs.environment }}-${{ github.repository }}
